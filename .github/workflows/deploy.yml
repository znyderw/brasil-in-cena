name: Deploy Brasil in Cena
on:
  push:
    branches:
      - main
  schedule:
    # Segundas, 09h00 BRT (12h00 UTC)
    - cron: '0 12 * * 1'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Jinja2

      - name: Sync IBGE Data & Fetch Culture Metadata
        env:
          UNSPLASH_ACCESS_TOKEN: ${{ secrets.UNSPLASH_ACCESS_TOKEN }}
        run: python sync_ibge.py

      - name: Build Static Site Pages
        run: python build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "Auto-deploy: Update regions data and build pages."
