<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" href="../../../src/assets/styles/css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><title>QR Code | Brasil in Cena</title><style>
        :root {
            --primary-gradient: linear-gradient(135deg, #009b3a 0%, #fedd00 100%);
            --dark-bg: #0f172a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .qr-container {
            text-align: center;
            z-index: 10;
            animation: fadeIn 1.2s ease-out;
        }

        .qr-wrapper {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 0 50px rgba(0, 155, 58, 0.4);
            display: inline-block;
            margin-bottom: 30px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .qr-wrapper:hover {
            transform: scale(1.02);
        }

        .qr-wrapper::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: var(--primary-gradient);
            z-index: -1;
            border-radius: 28px;
            opacity: 0.7;
            filter: blur(10px);
        }

        #qrcode {
            width: 500px;
            height: 500px;
        }

        #qrcode img {
            width: 100%;
            height: 100%;
        }

        .instruction {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 20px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sub-instruction {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-top: 10px;
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 1;
        }

        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 15s infinite alternate;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: #009b3a;
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: #fedd00;
            bottom: -150px;
            right: -150px;
            animation-delay: -5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        @media (max-width: 600px) {
            #qrcode {
                width: 200px;
                height: 200px;
            }
            .instruction {
                font-size: 1.5rem;
            }
        }
    </style></head><body><div class="bg-glow"><div class="glow-circle glow-1"></div><div class="glow-circle glow-2"></div></div><a href="../../../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar ao site
    </a><div class="qr-container"><div class="qr-wrapper"><div id="qrcode"></div></div><h1 class="instruction">Explore o Brasil</h1><p class="sub-instruction">Aponte sua câmera para acessar o projeto</p></div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script>
        window.onload = function() {
            const finalUrl = window.location.origin.includes('github.io') ? window.location.origin + '/brasil-in-cena/' : window.location.origin;
            
            new QRCode(document.getElementById("qrcode"), {
                text: finalUrl,
                width: 500,
                height: 500,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }
    </script></body></html>
