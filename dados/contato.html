<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ root_path }}src/assets/styles/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/scrollreveal"></script>
    <title>Contato | Brasil in Cena</title>
</head>
<body>
    {% include '_header.html' %}
    <main>
        <section id="contato">
            <div id="center">
                <h1 class="title-center">
                    Nos acompanhe em nossas
                    <span class="subtitle-center">redes sociais</span>
                </h1>
                <p class="section-txt">
                    Atualizamos todo nosso projeto atráves de nossas redes sociais com postagens para que voce fique
                    sempre atualizado!
                </p>
                <div class="social-buttons-container">
                    <button class="Btn instagram-btn" onclick="instagram()">
                        <div class="sign">
                            <i class="fa-brands fa-instagram" style="color: white; font-size: 24px;"></i>
                        </div>
                        <div class="text"> @brasilincena_</div>
                    </button>
                    <button class="Btn tiktok-btn" onclick="tiktok()">
                        <div class="sign">
                            <i class="fa-brands fa-tiktok" style="color: white; font-size: 24px;"></i>
                        </div>
                        <div class="text"> @brasilincena_</div>
                    </button>
                    <button class="Btn gmail-btn" onclick="gmail()">
                        <div class="sign">
                            <i class="fa-solid fa-envelope" style="color: white; font-size: 24px;"></i>
                        </div>
                        <div class="text">brasilincena@gmail.com</div>
                    </button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <img src="{{ root_path }}src/assets/styles/img/footer.svg" alt="" loading="lazy">
        <div id="footer_items">
            <span id="copyright">
                &copy 2025 Brasil In Cena
            </span>
        </div>
    </footer>
    <script src="{{ root_path }}src/assets/styles/js/script.js"></script>
</body>
</html>
